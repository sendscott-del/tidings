<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="116" fill="#F59E0B"/>
      <!-- Herald / fanfare trumpet, mirrored so the bell points up-left
           and the J-hook + mouthpiece sit on the lower-right.
           Construction: trumpet drawn horizontally (bell on right,
           mouthpiece on left), then transformed by:
             matrix(-1 0 0 1 512 0)  - flip horizontally around x=256
             rotate(30 256 256)       - tilt bell up
           (SVG applies right-to-left, so flip first, then rotate.) -->
      <g transform="rotate(30 256 256) matrix(-1 0 0 1 512 0)" fill="#FFFFFF">
        <!-- Bell -->
        <path d="M 340 218
                 L 472 132
                 Q 488 132 488 148
                 L 488 364
                 Q 488 380 472 380
                 L 340 294 Z"/>
        <!-- Body tube -->
        <rect x="150" y="232" width="196" height="22" rx="4"/>
        <!-- J-hook — single rounded U below the body. Stroked so the
             inner amber shows through, making the tube reading clear. -->
        <path d="M 156 254
                 L 156 282
                 Q 156 306 180 306
                 L 256 306
                 Q 282 306 282 282
                 L 282 254"
              fill="none"
              stroke="#FFFFFF"
              stroke-width="22"
              stroke-linejoin="round"/>
        <!-- Mouthpiece bowl at the top of the J's right leg -->
        <ellipse cx="282" cy="244" rx="14" ry="16"/>
      </g>
    </svg>
