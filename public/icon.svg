<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="116" fill="#F59E0B"/>
      <!-- Trumpet at ~20° fanfare angle, with three visible valve
           casings on the body so the silhouette can't be confused with
           a plunger or bugle. Mouthpiece on lower-left, bell flared
           upper-right. White on amber. -->
      <g fill="#FFFFFF" transform="rotate(-20 256 256)">
        <!-- Mouthpiece bowl -->
        <ellipse cx="88" cy="256" rx="22" ry="26"/>
        <!-- Body tube -->
        <rect x="100" y="244" width="200" height="24" rx="6"/>
        <!-- Three valve casings — the visual cue that says "trumpet" -->
        <rect x="150" y="208" width="20" height="40" rx="5"/>
        <rect x="184" y="208" width="20" height="40" rx="5"/>
        <rect x="218" y="208" width="20" height="40" rx="5"/>
        <!-- Bell — flared cone with rounded rim -->
        <path d="M300 226
                 L 432 138
                 Q 446 138 446 152
                 L 446 360
                 Q 446 374 432 374
                 L 300 286 Z"/>
      </g>
    </svg>
