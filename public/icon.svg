<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="116" fill="#F59E0B"/>
      <!-- Coiled trumpet matching the user's reference:
           1) pill/stadium loop in the middle (the coiled tubing)
           2) smooth curving lead pipe from the loop up to the bell
           3) flared bell at the upper-right with a rim
           4) mouthpiece bulb on the left of the loop
           All smooth curves, white on amber. -->
      <!-- 1. Pill loop -->
      <rect x="100" y="290" width="240" height="70" rx="35"
            fill="none" stroke="#FFFFFF" stroke-width="30"/>
      <!-- 2. Lead pipe up to the bell -->
      <path d="M 318 305 C 350 280 355 240 350 200"
            stroke="#FFFFFF" stroke-width="30" fill="none"
            stroke-linecap="round"/>
      <!-- 3. Bell with a soft rim, rotated to point up-right -->
      <g transform="rotate(-40 360 180)">
        <path d="M 340 165 L 470 130 Q 488 130 488 148 L 488 212
                 Q 488 230 470 230 L 340 195 Z" fill="#FFFFFF"/>
        <ellipse cx="488" cy="180" rx="8" ry="52" fill="#FFFFFF"/>
      </g>
      <!-- 4. Mouthpiece bowl on the left -->
      <ellipse cx="78" cy="325" rx="18" ry="22" fill="#FFFFFF"/>
    </svg>
