<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v=2 cache-bust: Chrome maintains a separate favicon cache that
         ignores normal page refreshes, so it kept showing the pre-trumpet
         icon even after we redeployed. Bumping this version string forces
         the browser to fetch a "new" file. Bump again on any future
         favicon change. -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F59E0B" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tidings" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tidings</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('[sw] registration failed', err);
          });
        });
      }
    </script>
  </body>
</html>
